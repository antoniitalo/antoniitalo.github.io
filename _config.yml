# -----------------------------------------------------------------------------
# Site settings
# -----------------------------------------------------------------------------

title: Antoni-Italo de Moragas
first_name: Antoni-Italo
middle_name:
last_name: de Moragas

email: antoni.demoragas@cunef.edu
description: >
  Associate Professor (Profesor Titular) of Economics and Ramón y Cajal Fellow
  at CUNEF Universidad. Research in political economy, applied theory, and
  applied microeconomics.
footer_text: >
  Powered by <a href="https://jekyllrb.com/" target="_blank">Jekyll</a> with
  <a href="https://github.com/alshedivat/al-folio" target="_blank">al-folio</a>
  theme. Hosted by <a href="https://pages.github.com/" target="_blank">GitHub Pages</a>.

keywords: political economy, applied microeconomics, applied theory, media economics, secessionism, populism, CUNEF, Madrid, Ramón y Cajal
lang: en
icon: 📚

url: https://www.antonidemoragas.eu
baseurl:
last_updated:

# -----------------------------------------------------------------------------
# Theme
# -----------------------------------------------------------------------------

# Sets the default appearance: "light", "dark", or "auto"
default_mode: light

# Force the navbar to be at the top: true | false
navbar_fixed: true
# Force the footer to be at the bottom of the page: true | false
footer_fixed: true

# Dimensions
max_width: 920px

# Open graph metadata for SEO (used by social cards)
serve_og_meta: true
serve_schema_org:  true
og_image:

# RSS Feed settings
rss_icon: true

# Toggles for social/scholar icons
back_to_top: true

# -----------------------------------------------------------------------------
# RSS Feed
# -----------------------------------------------------------------------------
# will use title and url fields
# Atom feed will be served at: <url>/feed.xml
feed:
  excerpt_only: true

# -----------------------------------------------------------------------------
# Layout
# -----------------------------------------------------------------------------

# Number of news posts on the homepage
news_limit: 6

# Enable or disable pagination
pagination:
  enabled: true

# -----------------------------------------------------------------------------
# Jekyll Scholar (publications)
# -----------------------------------------------------------------------------

scholar:
  last_name: [de Moragas, Moragas]
  first_name: [Antoni-Italo, Antoni Italo, Antoni]

  style: apa
  locale: en

  source: /_bibliography/
  bibliography: papers.bib
  bibliography_template: bib

  replace_strings: true
  join_strings: true

  details_dir: bibliography
  details_layout: bibtex.html
  details_link: Details

  query: "@*"

  bibtex_filters: [latex, smallcaps, superscripts]
  group_by: year
  group_order: descending

# Filter out certain bibtex entry keywords used internally from the bib file
filtered_bibtex_keywords: [abbr, abstract, arxiv, bibtex_show, html, pdf, selected, supp, blog, code, slides, poster, website]

# Display different categories under publications page
enable_publication_thumbnails: false
enable_publication_categories: true

# -----------------------------------------------------------------------------
# Profile (homepage left column)
# -----------------------------------------------------------------------------

profile:
  align: right
  image: prof_pic.jpg
  image_circular: false
  more_info: >
    <p><strong>CUNEF Universidad</strong></p>
    <p>Despacho F4.5</p>
    <p>C/ Leonardo Prieto Castro, 2</p>
    <p>28040 Madrid, Spain</p>

# -----------------------------------------------------------------------------
# Social integration
# -----------------------------------------------------------------------------
# Fill any of these in when you have the handle. Empty values hide the icon.
github_username:
twitter_username:
linkedin_username:
scholar_userid:
orcid_id:
ssrn_id:
ideas_repec:
researchgate_username:
osf_id:

# -----------------------------------------------------------------------------
# Build settings
# -----------------------------------------------------------------------------

markdown: kramdown
highlighter: rouge

plugins:
  - jekyll-archives
  - jekyll-diagrams
  - jekyll-email-protect
  - jekyll-feed
  - jekyll-imagemagick
  - jekyll-paginate-v2
  - jekyll/scholar
  - jekyll-sitemap
  - jekyll-twitter-plugin
  - jemoji

# -----------------------------------------------------------------------------
# Collections
# -----------------------------------------------------------------------------

collections:
  news:
    defaults:
      layout: post
    output: true
    permalink: /news/:path/
  projects:
    output: true
    permalink: /projects/:path/

news_scrollable: true
news_collapsible: false

# Exclude from processing.
exclude:
  - bin/
  - Gemfile
  - Gemfile.lock
  - vendor
